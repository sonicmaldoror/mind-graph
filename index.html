<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartographie de la philosophie de l'esprit contemporaine</title>
  <meta name="description" content="Graphe interactif des grandes dimensions conceptuelles de la philosophie de l'esprit depuis le milieu du XXe si&egrave;cle.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <h1>Philosophie de l'esprit</h1>
      <p class="header-subtitle">Cartographie conceptuelle contemporaine</p>
    </div>
    <div class="header-controls">
      <button id="toggle-authors" class="control-btn" title="Afficher/masquer les auteurs">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="5" r="3"/>
          <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
        </svg>
        <span>Auteurs</span>
      </button>
      <button id="toggle-theme" class="control-btn" title="Changer le th&egrave;me">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M13.5 8.5a5.5 5.5 0 01-7-7 6 6 0 107 7z"/>
        </svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="3"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Graph container -->
  <div id="graph-container">
    <svg id="graph-svg"></svg>
  </div>

  <!-- Zoom controls -->
  <div class="zoom-controls">
    <button id="zoom-in" class="zoom-btn" title="Zoom avant">+</button>
    <button id="zoom-out" class="zoom-btn" title="Zoom arri&egrave;re">&minus;</button>
    <button id="zoom-reset" class="zoom-btn" title="R&eacute;initialiser le zoom" style="font-size:13px">&#8634;</button>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="tooltip" aria-hidden="true"></div>

  <!-- Legend -->
  <div class="legend" id="legend">
    <div class="legend-section">
      <h3>Familles</h3>
      <div id="legend-families"></div>
    </div>
    <div class="legend-section">
      <h3>Liens</h3>
      <div class="legend-links">
        <div class="legend-link-item">
          <svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" stroke="var(--link-filiation)" stroke-width="1.5"/></svg>
          <span>Filiation</span>
        </div>
        <div class="legend-link-item">
          <svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" stroke="var(--link-opposition)" stroke-width="1.5" stroke-dasharray="4,3"/></svg>
          <span>Opposition</span>
        </div>
        <div class="legend-link-item">
          <svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" stroke="var(--link-reformulation)" stroke-width="1.5" stroke-dasharray="8,4"/></svg>
          <span>Reformulation</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail panel -->
  <aside id="detail-panel" class="detail-panel" aria-hidden="true">
    <button id="panel-close" class="panel-close" aria-label="Fermer">&times;</button>
    <div id="panel-content"></div>
  </aside>

  <!-- D3.js -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <!-- App modules -->
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
